<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DA3FF"/>
      <stop offset="100%" style="stop-color:#2d8fef"/>
    </linearGradient>
  </defs>

  <!-- 背景（角丸正方形） -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- カレンダー本体 -->
  <rect x="5" y="9" width="22" height="18" rx="2.5" fill="white" opacity="0.95"/>

  <!-- カレンダー上部バー -->
  <rect x="5" y="9" width="22" height="6.5" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="5" y="12.5" width="22" height="3" fill="white" opacity="0.95"/>
  <rect x="5" y="9" width="22" height="6" rx="0" fill="#2d8fef" opacity="0.25"/>
  <rect x="5" y="9" width="22" height="5.5" rx="2.5" fill="#1a7fd4" opacity="0.35"/>

  <!-- ピン（左） -->
  <rect x="10" y="6.5" width="2.5" height="5" rx="1.25" fill="white" opacity="0.9"/>
  <!-- ピン（右） -->
  <rect x="19.5" y="6.5" width="2.5" height="5" rx="1.25" fill="white" opacity="0.9"/>

  <!-- グリッド線（横） -->
  <line x1="5" y1="21" x2="27" y2="21" stroke="#4DA3FF" stroke-width="0.5" opacity="0.3"/>

  <!-- チェックマーク -->
  <polyline points="10,20.5 13.5,24 22,15.5" fill="none" stroke="#4DA3FF" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
