{% extends "base.html" %}
{% block title %}ログイン - ClearShift{% endblock %}

{% block content %}
<div class="min-h-screen bg-surface flex flex-col items-center justify-center px-4">
  <!-- ロゴ -->
  <a href="{{ url_for('main.landing') }}" class="flex items-center gap-2 mb-8">
    <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
    </div>
    <span class="text-xl font-bold text-gray-900">ClearShift</span>
  </a>

  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">ログイン</h1>
    <p class="text-sm text-gray-500 mb-6">シフト作成者のアカウントでログイン</p>

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">メールアドレス（Gmail）</label>
        <input type="email" name="email" required placeholder="your@gmail.com"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">パスワード</label>
        <input type="password" name="password" required placeholder="••••••••"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all" />
      </div>
      <button type="submit"
        class="w-full py-2.5 bg-primary text-white rounded-lg font-semibold text-sm hover:bg-primary-dark transition-colors mt-2">
        ログイン
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      アカウントをお持ちでない方は
      <a href="{{ url_for('auth.register') }}" class="text-primary font-medium hover:underline">新規登録</a>
    </p>
  </div>
</div>
{% endblock %}
