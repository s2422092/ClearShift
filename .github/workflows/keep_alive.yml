name: Supabase Keep-Alive

on:
  schedule:
    # 毎日 9:00 JST (= 00:00 UTC) に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to keep Supabase active
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/ping")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase keep-alive ping succeeded."
